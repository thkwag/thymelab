 */

plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation "org.junit.jupiter:junit-jupiter:${rootProject.versions.junitVersion}"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher:${rootProject.versions.junitPlatformVersion}"
    implementation "com.google.guava:guava:${rootProject.versions.guavaVersion}"
    implementation "com.formdev:flatlaf:${rootProject.versions.flatlafVersion}"
    implementation "org.fusesource.jansi:jansi:${rootProject.versions.jansiVersion}"
    implementation "org.json:json:${rootProject.versions.jsonVersion}"
    testImplementation "org.mockito:mockito-core:${rootProject.versions.mockitoVersion}"
    testImplementation "org.mockito:mockito-junit-jupiter:${rootProject.versions.mockitoVersion}"
}

application {
    mainClass = 'com.github.thkwag.thymelab.launcher.ThymeLabLauncher'
}

tasks.named('test') {
    useJUnitPlatform()
}

jar {
    archiveFileName = "thymelab-launcher-${rootProject.versions.projectVersion.trim()}.jar"
    manifest {
        attributes(
            'Main-Class': 'com.github.thkwag.thymelab.launcher.ThymeLabLauncher',
            'Implementation-Title': 'ThymeLab',
            'Implementation-Version': rootProject.versions.projectVersion.trim(),
            'Implementation-Vendor': 'THK',
            'Project-Version': rootProject.versions.projectVersion.trim()
        )
    }
    
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    from(sourceSets.main.output)
    from('src/main/resources') {
        include '**/*.properties'
        include '**/*.ico'
        include '**/*.png'
        include '**/*.icns'
    }
    from(rootProject.file('version.properties'))
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    destinationDirectory = file("${buildDir}/libs")
}

tasks.register('copyProcessorJar') {
    dependsOn ':modules:processor:bootJar'
    doLast {
        copy {
            from "${project(':modules:processor').buildDir}/libs/thymelab-processor-${rootProject.versions.projectVersion.trim()}.jar"
            into "${buildDir}/libs/lib"
        }
    }
}

tasks.register('createRuntime') {
    doLast {
        def runtimeDir = new File("${buildDir}/runtime")
        if (runtimeDir.exists()) {
            runtimeDir.deleteDir()
        }

        def jlinkHome = System.getenv("JAVA_HOME")
        def jlinkPath = "${jlinkHome}/bin/jlink"
        if (System.getProperty("os.name").toLowerCase().contains("windows")) {
            jlinkPath += ".exe"
        }
        
        exec {
            commandLine jlinkPath,
                '--add-modules', 'java.base,java.desktop,java.logging,java.prefs,java.xml,jdk.crypto.ec,' +
                               'java.management,java.naming,java.sql,java.security.jgss,java.security.sasl,' +
                               'jdk.security.auth,java.instrument,jdk.management,jdk.unsupported,' +
                               'java.compiler,jdk.jdi,java.scripting,jdk.jfr,jdk.net',
                '--strip-debug',
                '--no-man-pages',
                '--no-header-files',
                '--compress=2',
                '--output', "${buildDir}/runtime"
        }
    }
}

tasks.register('createInstaller') {
    dependsOn jar, createRuntime, copyProcessorJar
    
    doLast {
        def distDir = new File("${buildDir}/dist")
        if (!distDir.exists()) {
            distDir.mkdirs()
        }
        
        def jpackageHome = System.getenv("JAVA_HOME")
        def jpackagePath = "${jpackageHome}/bin/jpackage"
        def isWindows = System.getProperty("os.name").toLowerCase().contains("windows")
        if (isWindows) {
            jpackagePath += ".exe"
        }
        
        def tmpDir = new File("${buildDir}/tmp")
        if (tmpDir.exists()) {
            tmpDir.deleteDir()
        }
        tmpDir.mkdirs()
        
        def installerType = isWindows ? 'exe' : 'dmg'
        def commonArgs = [
            jpackagePath,
            '--type', installerType,
            '--input', "${buildDir}/libs",
            '--dest', "${buildDir}/dist",
            '--name', "ThymeLab",
            '--main-jar', "thymelab-launcher-${rootProject.versions.projectVersion.trim()}.jar",
            '--main-class', 'com.github.thkwag.thymelab.launcher.ThymeLabLauncher',
            '--resource-dir', "${buildDir}/libs",
            '--app-version', rootProject.versions.projectVersion.trim(),
            '--vendor', 'THK',
            '--copyright', 'Copyright © 2024 ThymeLab.',
            '--icon', "${projectDir}/src/main/resources/${isWindows ? 'icon.ico' : 'icon.icns'}",
            '--java-options', '--add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.prefs/java.util.prefs=ALL-UNNAMED --add-opens=java.base/java.nio.charset=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED -Dapple.awt.UIElement=true',
            '--runtime-image', "${buildDir}/runtime",
            '--temp', "${buildDir}/tmp"
        ]

        if (isWindows) {
            commonArgs.addAll([
                '--win-dir-chooser',
                '--win-menu',
                '--win-menu-group', 'ThymeLab',
                '--win-per-user-install',
                '--win-shortcut',
                '--win-upgrade-uuid', 'a9c5ba72-5c1c-4c9c-9c1e-1c1c1c1c1c1c',
                '--temp', "${buildDir}/tmp",
                '--verbose',
                '--description', 'Thymeleaf Template Processor',
                '--win-shortcut-prompt',
                '--license-file', 'LICENSE',
                '--about-url', 'https://github.com/thkwag/thymelab',
                '--win-help-url', 'https://github.com/thkwag/thymelab/issues'
            ])
        } else {
            commonArgs.addAll([
                '--mac-package-name', 'ThymeLab',
                '--mac-package-identifier', 'com.github.thkwag.thymelab.launcher'
            ])
        }

        exec {
            commandLine commonArgs
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.release = rootProject.versions.javaTargetVersion.toInteger()
}

processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    
    from('src/main/resources') {
        include '**/*.properties'
        include '**/*.ico'
        include '**/*.png'
    }
    
    from(rootProject.file('version.properties')) {
        into('.')
    }
    
    doLast {
        copy {
            from 'src/main/resources'
            into "${buildDir}/classes/java/main"
            include '**/*.properties'
            include '**/*.ico'
            include '**/*.png'
        }
        copy {
            from rootProject.file('version.properties')
            into "${buildDir}/classes/java/main"
        }
    }
}

tasks.named('run') {
    enabled = !project.hasProperty('createInstaller')
}

tasks.withType(JavaExec) {
    jvmArgs = [
        '--add-opens=java.base/java.util=ALL-UNNAMED',
        '--add-opens=java.base/java.lang=ALL-UNNAMED',
        '--add-opens=java.base/java.lang.invoke=ALL-UNNAMED',
        '--add-opens=java.prefs/java.util.prefs=ALL-UNNAMED',
        '--add-opens=java.base/java.nio.charset=ALL-UNNAMED',
        '--add-opens=java.base/java.net=ALL-UNNAMED',
        '--add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED',
        '-Dapple.awt.UIElement=true'
    ]
}

task runProcessor(type: JavaExec) {
    dependsOn ':modules:processor:bootJar'
    classpath = project(':modules:processor').sourceSets.main.runtimeClasspath
    mainClass = 'com.github.thkwag.thymelab.processor.ThymeLabProcessorApplication'
    workingDir = "${rootProject.projectDir}/build/modules/processor"
    
    jvmArgs = [
        '-Dspring.output.ansi.enabled=always',
        '--add-opens=java.base/java.util=ALL-UNNAMED',
        '--add-opens=java.base/java.lang=ALL-UNNAMED',
        '--add-opens=java.base/java.lang.invoke=ALL-UNNAMED',
        '--add-opens=java.prefs/java.util.prefs=ALL-UNNAMED',
        '--add-opens=java.base/java.nio.charset=ALL-UNNAMED',
        '--add-opens=java.base/java.net=ALL-UNNAMED',
        '--add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED',
        '-Dapple.awt.UIElement=true'
    ]
}

jar.dependsOn(':modules:processor:jar')

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/main/resources']
        }
    }
    test {
        resources {
            srcDirs = ['src/test/resources']
        }
    }
}
